services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YemekSiparis_2024!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "YemekSiparis_2024!", "-Q", "SELECT 1", "-C"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./SiparisUygulama
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=YemekSiparisDB;User Id=sa;Password=YemekSiparis_2024!;TrustServerCertificate=True;
      - AiService__BaseUrl=http://ai-service:8000
    volumes:
      - uploads_data:/app/wwwroot/uploads
    depends_on:
      sqlserver:
        condition: service_healthy
      ai-service:
        condition: service_healthy

volumes:
  sqlserver_data:
  uploads_data:
